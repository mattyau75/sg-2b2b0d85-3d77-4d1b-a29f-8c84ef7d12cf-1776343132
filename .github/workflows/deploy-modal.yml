name: Deploy Modal GPU Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Fixes the Node.js warning and ensures latest environment
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Modal
        run: pip install modal

      - name: Verify Secrets
        run: |
          if [ -z "${{ secrets.MODAL_TOKEN_ID }}" ]; then
            echo "❌ ERROR: MODAL_TOKEN_ID is missing in GitHub Secrets"
            exit 1
          fi
          if [ -z "${{ secrets.MODAL_TOKEN_SECRET }}" ]; then
            echo "❌ ERROR: MODAL_TOKEN_SECRET is missing in GitHub Secrets"
            exit 1
          fi
          echo "✅ Secrets found, proceeding..."

      - name: Authenticate and Deploy
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          modal token set --token-id $MODAL_TOKEN_ID --token-secret $MODAL_TOKEN_SECRET
          modal deploy modal_worker.py

      - name: Success
        if: success()
        run: echo "🚀 GPU Worker is LIVE!"
