name: Deploy GPU to Modal.com

on:
  push:
    branches: [ main ]
    paths:
      - 'modal_worker.py'
      - '.github/workflows/deploy_gpu.yml'
  workflow_dispatch: # 🛠️ ADDED: Allows manual 'Run workflow' button in GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Modal
        run: |
          python -m pip install --upgrade pip
          pip install modal

      - name: Deploy to Modal
        run: |
          # Deploy specifically to match the URL: https://mattjeffs--basketball-scout-ai-analyze.modal.run
          modal deploy modal_worker.py
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}